<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 280" width="100%" height="100%">
  <defs>
    <!-- Dark tech gradient background -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#020813" />
      <stop offset="50%" stop-color="#07162c" />
      <stop offset="100%" stop-color="#0a2246" />
    </linearGradient>

    <!-- Neon Cyan/Blue Glow for chlorine spray -->
    <filter id="cyanGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <!-- Neon Violet/Magenta Glow for UV light -->
    <filter id="violetGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <!-- Yellow Glow for Hard Hat/Accents -->
    <filter id="yellowGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <style>
    /* CSS Animations */
    @keyframes gridScroll {
      0% { transform: translateY(0); }
      100% { transform: translateY(40px); }
    }
    @keyframes titlePulse {
      0%, 100% { opacity: 0.9; text-shadow: 0 0 8px #00d2ff, 0 0 20px #0066ff; }
      50% { opacity: 1; text-shadow: 0 0 15px #00d2ff, 0 0 35px #0066ff, 0 0 50px #0033aa; }
    }
    @keyframes bobble {
      0%, 100% { transform: translateY(0px); }
      50% { transform: translateY(-4px); }
    }
    @keyframes uvPulse {
      0%, 100% { opacity: 0.7; filter: drop-shadow(0 0 5px rgba(186,85,211,0.5)); }
      50% { opacity: 1; filter: drop-shadow(0 0 20px rgba(186,85,211,1)); }
    }
    @keyframes sprayOut {
      0% { transform: translate(0, 0) scale(0.6); opacity: 1; }
      80% { transform: translate(-30px, 100px) scale(1.3); opacity: 0.6; }
      100% { transform: translate(-40px, 130px) scale(1.6); opacity: 0; }
    }
    @keyframes lightRay {
      0%, 100% { opacity: 0.2; }
      50% { opacity: 0.75; }
    }
    @keyframes ciliaWiggle {
      0%, 100% { transform: skewX(-3deg) scaleY(1); }
      50% { transform: skewX(3deg) scaleY(0.95); }
    }
    @keyframes virusSpin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    @keyframes amoebaMorph {
      0%, 100% { d: path("M 0,-18 Q 12,-16 14,-2 Q 10,12 0,10 Q -12,12 -14,-2 Q -12,-16 0,-18 Z"); }
      50% { d: path("M 0,-20 Q 15,-13 11,-4 Q 14,8 0,12 Q -14,8 -11,-4 Q -15,-13 0,-20 Z"); }
    }

    .grid-lines {
      stroke: #0d274c;
      stroke-width: 1;
      opacity: 0.6;
    }
    .grid-scroller {
      animation: gridScroll 4s linear infinite;
    }
    .game-title {
      font-family: 'Courier New', Courier, monospace, sans-serif;
      font-weight: 900;
      font-size: 58px;
      fill: #e1f7ff;
      letter-spacing: 6px;
      animation: titlePulse 3s ease-in-out infinite;
      text-anchor: middle;
    }
    .subtitle {
      font-family: 'Courier New', Courier, monospace, sans-serif;
      font-size: 11px;
      letter-spacing: 4px;
      fill: #00ffcc;
      text-anchor: middle;
      font-weight: bold;
      opacity: 0.8;
    }
    .operator-rig {
      animation: bobble 3.5s ease-in-out infinite;
    }
    .dosing-spray {
      animation: sprayOut 1.5s linear infinite;
    }
    .uv-lamp {
      animation: uvPulse 2s ease-in-out infinite;
    }
    .uv-ray {
      animation: lightRay 3s ease-in-out infinite;
    }
    .bacteria-body {
      animation: ciliaWiggle 1.5s ease-in-out infinite;
    }
    .virus-rotor {
      transform-origin: 0px -15px;
      animation: virusSpin 6s linear infinite;
    }
    .amoeba-shape {
      animation: amoebaMorph 3s ease-in-out infinite;
    }
  </style>

  <!-- Background -->
  <rect width="800" height="280" fill="url(#bgGrad)" />

  <!-- Grid Tech Lines -->
  <g class="grid-scroller">
    <path class="grid-lines" d="M0,0 H800 M0,40 H800 M0,80 H800 M0,120 H800 M0,160 H800 M0,200 H800 M0,240 H800 M0,280 H800 M0,320 H800" />
  </g>
  <path class="grid-lines" d="M40,0 V280 M80,0 V280 M120,0 V280 M160,0 V280 M200,0 V280 M240,0 V280 M280,0 V280 M320,0 V280 M360,0 V280 M400,0 V280 M440,0 V280 M480,0 V280 M520,0 V280 M560,0 V280 M600,0 V280 M640,0 V280 M680,0 V280 M720,0 V280 M760,0 V280" />

  <rect width="800" height="280" fill="none" stroke="#00d2ff" stroke-width="2" opacity="0.25" />

  <!-- ── MAIN TITLE ── -->
  <g transform="translate(400, 110)">
    <text class="game-title" filter="url(#cyanGlow)">DISS N Fex</text>
    <text y="38" class="subtitle">DRINKING WATER DISINFECTION TERMINAL</text>
    <line x1="-160" y1="52" x2="160" y2="52" stroke="#00ffcc" stroke-width="1.5" opacity="0.6" filter="url(#cyanGlow)"/>
    <text y="70" font-family="'Courier New', monospace" font-size="10" fill="#88aacc" text-anchor="middle" letter-spacing="1">SCADA HYDRAULIC MODEL // BY K. WILKINSON</text>
  </g>

  <!-- ── WATER TREATMENT OPERATOR RIG (Left Side) ── -->
  <!-- Replaced the cloud with the actual Duty Operator wearing yellow hard hat and safety vest -->
  <g class="operator-rig" transform="translate(90, 50)">
    
    <!-- Chemical Feed Pump Console (Background asset) -->
    <g transform="translate(42, 35) scale(0.48)">
      <!-- Pump motor -->
      <rect x="10" y="-40" width="30" height="40" fill="#6d7777" rx="3" stroke="#2b3436" stroke-width="1.5"/>
      <!-- Pump body -->
      <rect x="-10" y="0" width="70" height="50" fill="#f4b600" rx="6" stroke="#7d5700" stroke-width="1.5"/>
      <!-- Gauge -->
      <circle cx="5" cy="20" r="10" fill="#111619" stroke="#5f6767" stroke-width="1.5"/>
      <line x1="5" y1="20" x2="11" y2="14" stroke="#e54334" stroke-width="1.5" />
    </g>

    <!-- Operator Legs -->
    <rect x="22" y="76" width="9" height="20" fill="#113846" rx="2"/>
    <rect x="36" y="76" width="9" height="20" fill="#113846" rx="2"/>
    <!-- Boots -->
    <rect x="19" y="94" width="13" height="6" fill="#0a222a" rx="2"/>
    <rect x="34" y="94" width="13" height="6" fill="#0a222a" rx="2"/>

    <!-- Operator Torso (Teal jumpsuit) -->
    <rect x="16" y="36" width="35" height="42" fill="#1589a0" rx="8" stroke="#d7fffb" stroke-width="1.5"/>

    <!-- Safety Vest (High-vis lime yellow safety straps) -->
    <path d="M 22,36 L 27,78 M 45,36 L 40,78" stroke="#d7ff3c" stroke-width="4.5" stroke-linecap="round" opacity="0.9"/>
    <!-- Horizontal vest stripe -->
    <line x1="17" y1="62" x2="50" y2="62" stroke="#d7ff3c" stroke-width="4" opacity="0.9"/>

    <!-- Left Arm operating the pump controls -->
    <path d="M 17,44 Q -2,48 -1,62" fill="none" stroke="#1589a0" stroke-width="7" stroke-linecap="round"/>
    <circle cx="-1" cy="63" r="4" fill="#ffd5af"/>

    <!-- Right Arm holding the chemical dosing probe -->
    <path d="M 50,44 Q 68,46 72,58" fill="none" stroke="#1589a0" stroke-width="7" stroke-linecap="round"/>
    <circle cx="72" cy="60" r="4" fill="#ffd5af"/>

    <!-- Chemical Dosing Probe (Yellow shaft with sensor tip) -->
    <line x1="72" y1="58" x2="72" y2="82" stroke="#ffd73b" stroke-width="2.5" stroke-linecap="round"/>
    <rect x="69" y="82" width="6" height="8" fill="#12333f" rx="1"/>
    
    <!-- Operator Neck & Head -->
    <rect x="29" y="27" width="9" height="10" fill="#bd7354"/>
    <ellipse cx="33.5" cy="18" r="15" fill="#ffd5af" stroke="#5f352e" stroke-width="1"/>

    <!-- Hair/Sideburns -->
    <path d="M 20.5,12 C 20.5,12 21.5,5 29,5 L 29,14 Z" fill="#39251f" />

    <!-- Safety Hard Hat (Yellow helmet with white rim) -->
    <path d="M 17.5,7 C 17.5,7 20,-10 33.5,-10 C 47,-10 49.5,7 49.5,7 Z" fill="#ffca45" filter="url(#yellowGlow)"/>
    <rect x="14" y="6" width="39" height="4" fill="#ffca45" rx="1"/>
    <line x1="33.5" y1="-10" x2="33.5" y2="6" stroke="#fff2b5" stroke-width="1.8"/>

    <!-- Face details (Safety shades) -->
    <rect x="23" y="13" width="10" height="6" fill="rgba(20,20,40,0.9)" rx="1.5"/>
    <rect x="35" y="13" width="10" height="6" fill="rgba(20,20,40,0.9)" rx="1.5"/>
    <line x1="32" y1="15" x2="36" y2="15" stroke="#111" stroke-width="1.5"/>
    
    <!-- Smile -->
    <path d="M 29,26 Q 33.5,29 38,26" fill="none" stroke="#4d2a24" stroke-width="1.8" stroke-linecap="round"/>

    <!-- ── Chlorine Contact Spray (Chemical mist emitting from probe) ── -->
    <circle class="dosing-spray" cx="72" cy="94" r="3" fill="#00ffff" opacity="0.8" style="animation-delay: 0s;" filter="url(#cyanGlow)" />
    <circle class="dosing-spray" cx="72" cy="94" r="2" fill="#00ffff" opacity="0.8" style="animation-delay: 0.3s;" filter="url(#cyanGlow)" />
    <circle class="dosing-spray" cx="72" cy="94" r="4" fill="#00ffff" opacity="0.8" style="animation-delay: 0.6s;" filter="url(#cyanGlow)" />
    <circle class="dosing-spray" cx="72" cy="94" r="2.5" fill="#00ffff" opacity="0.8" style="animation-delay: 0.9s;" filter="url(#cyanGlow)" />
    <circle class="dosing-spray" cx="72" cy="94" r="3.5" fill="#00ffff" opacity="0.8" style="animation-delay: 1.2s;" filter="url(#cyanGlow)" />
  </g>

  <!-- ── UV DISINFECTION REACTOR (Right Side) ── -->
  <!-- Replaced the natural cloud/lightning with an industrial UV tube reactor -->
  <g transform="translate(630, 20)">
    
    <!-- Steel Mounting Bracket / End caps -->
    <rect x="-8" y="0" width="36" height="14" fill="#455a64" rx="2" stroke="#263238" stroke-width="2"/>
    <rect x="-8" y="160" width="36" height="14" fill="#455a64" rx="2" stroke="#263238" stroke-width="2"/>

    <!-- Support rods -->
    <line x1="-4" y1="14" x2="-4" y2="160" stroke="#78909c" stroke-width="2" />
    <line x1="24" y1="14" x2="24" y2="160" stroke="#78909c" stroke-width="2" />

    <!-- Glass Quartz Sleeve -->
    <rect x="0" y="14" width="20" height="146" fill="rgba(255,255,255,0.08)" stroke="rgba(255,255,255,0.3)" stroke-width="1.5" />

    <!-- Glowing UV Disinfection Lamp (Violet light column) -->
    <rect class="uv-lamp" x="4" y="18" width="12" height="138" fill="#e8f4ff" rx="4" filter="url(#violetGlow)" />

    <!-- UV Light Rays (Rays radiating outward) -->
    <line class="uv-ray" x1="-6" y1="40" x2="-45" y2="25" stroke="#ba55d3" stroke-width="2.5" stroke-linecap="round" opacity="0.4" filter="url(#violetGlow)" />
    <line class="uv-ray" x1="-8" y1="88" x2="-65" y2="88" stroke="#ba55d3" stroke-width="3" stroke-linecap="round" opacity="0.5" filter="url(#violetGlow)" />
    <line class="uv-ray" x1="-6" y1="130" x2="-45" y2="145" stroke="#ba55d3" stroke-width="2.5" stroke-linecap="round" opacity="0.4" filter="url(#violetGlow)" />
    
    <!-- Right facing rays -->
    <line class="uv-ray" x1="26" y1="45" x2="55" y2="35" stroke="#ba55d3" stroke-width="2" stroke-linecap="round" opacity="0.3" filter="url(#violetGlow)" />
    <line class="uv-ray" x1="28" y1="88" x2="70" y2="88" stroke="#ba55d3" stroke-width="2.5" stroke-linecap="round" opacity="0.4" filter="url(#violetGlow)" />
    <line class="uv-ray" x1="26" y1="125" x2="55" y2="135" stroke="#ba55d3" stroke-width="2" stroke-linecap="round" opacity="0.3" filter="url(#violetGlow)" />
  </g>

  <!-- Ground Line (SCADA Basin Bottom) -->
  <line x1="0" y1="240" x2="800" y2="240" stroke="#00ffcc" stroke-width="3" filter="url(#cyanGlow)" />
  <line x1="0" y1="240" x2="800" y2="240" stroke="#ffffff" stroke-width="1" />

  <!-- ── ENEMY PATHOGENS (At the bottom) ── -->

  <!-- 1. Bacillus (Left-Center) -->
  <g class="bacteria-body" transform="translate(240, 240)">
    <path d="M-6,-22 L-11,-24 M-6,-16 L-12,-17 M-6,-10 L-12,-10 M-6,-4 L-11,-3" stroke="#226622" stroke-width="1.2" />
    <path d="M6,-22 L11,-24 M6,-16 L12,-17 M6,-10 L12,-10 M6,-4 L11,-3" stroke="#226622" stroke-width="1.2" />
    <rect x="-6" y="-26" width="12" height="26" rx="5" fill="#44aa44" stroke="#1c501c" stroke-width="2" />
    <ellipse cx="0" cy="-13" rx="2" ry="6" fill="#1c501c" />
    <text y="13" font-family="monospace" font-size="8" fill="#44aa44" text-anchor="middle" font-weight="bold">Bacillus</text>
  </g>

  <!-- 2. Amoeba (Far Left) -->
  <g transform="translate(70, 240)">
    <path class="amoeba-shape" d="M 0,-18 Q 12,-16 14,-2 Q 10,12 0,10 Q -12,12 -14,-2 Q -12,-16 0,-18 Z" fill="#dd5588" stroke="#882255" stroke-width="2" />
    <circle cx="-2" cy="-5" r="3" fill="#661133" />
    <circle cx="-2.5" cy="-5.5" r="1" fill="#ffffff" opacity="0.8" />
    <text y="13" font-family="monospace" font-size="8" fill="#dd5588" text-anchor="middle" font-weight="bold">Amoeba</text>
  </g>

  <!-- 3. Budding Yeast (Center-Right) -->
  <g class="bacteria-body" transform="translate(520, 240)" style="animation-delay: 0.5s;">
    <line x1="-2" y1="-12" x2="9" y2="-17" stroke="#8a2be2" stroke-width="3" />
    <circle cx="-2" cy="-12" r="10" fill="#8a2be2" stroke="#4b0082" stroke-width="2" />
    <circle cx="-3" cy="-12" r="3" fill="#4b0082" opacity="0.6" />
    <circle cx="9" cy="-17" r="6.5" fill="#8a2be2" stroke="#4b0082" stroke-width="1.5" />
    <text y="13" font-family="monospace" font-size="8" fill="#a450ff" text-anchor="middle" font-weight="bold">Yeast Bud</text>
  </g>

  <!-- 4. Juggling Virus (Far Right) -->
  <g transform="translate(710, 240)">
    <path d="M0,-8 L-8,0 M0,-8 L8,0 M0,-8 L-4,-3 L-5,0 M0,-8 L4,-3 L5,0" stroke="#1e3f66" stroke-width="1.5" />
    <line x1="0" y1="-18" x2="0" y2="-8" stroke="#1e3f66" stroke-width="2.5" />
    <polygon points="0,-30 -7,-24 -5,-18 5,-18 7,-24" fill="#4682b4" stroke="#1e3f66" stroke-width="1.5" />
    <g class="virus-rotor">
      <circle cx="0" cy="-28" r="2.5" fill="#ff4444" />
      <circle cx="-9" cy="-14" r="2.5" fill="#44ff44" />
      <circle cx="9" cy="-14" r="2.5" fill="#4444ff" />
    </g>
    <text y="13" font-family="monospace" font-size="8" fill="#4682b4" text-anchor="middle" font-weight="bold">Virus</text>
  </g>

  <!-- 5. Biofilm Germ with Shield (Middle) -->
  <g class="bacteria-body" transform="translate(370, 240)" style="animation-delay: 0.8s;">
    <circle cx="0" cy="-13" r="7" fill="#448844" stroke="#225522" stroke-width="2" />
    <circle cx="-1" cy="-13" r="2" fill="#225522" opacity="0.6" />
    <circle cx="0" cy="-13" r="15" fill="rgba(0, 170, 255, 0.12)" stroke="rgba(0, 170, 255, 0.75)" stroke-width="1.8" filter="url(#cyanGlow)" stroke-dasharray="3,3" />
    <text y="13" font-family="monospace" font-size="8" fill="#44aa44" text-anchor="middle" font-weight="bold">Biofilm Germ</text>
  </g>

</svg>
